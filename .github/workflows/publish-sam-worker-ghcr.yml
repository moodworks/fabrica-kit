name: Publish pinned SAM worker to private GHCR

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: Exact reviewed 40-character lowercase source commit
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sam-worker-${{ inputs.source_commit }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      IMAGE_REPOSITORY: ghcr.io/moodworks/fabrica-sam-worker
      SOURCE_COMMIT: ${{ inputs.source_commit }}
    steps:
      - name: Validate immutable source input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${SOURCE_COMMIT}" =~ ^[0-9a-f]{40}$ ]] || [[ "${SOURCE_COMMIT}" == "0000000000000000000000000000000000000000" ]]; then
            echo "source commit must be a resolved lowercase SHA-1" >&2
            exit 1
          fi

      # actions/checkout v4.2.2, reviewed 2026-07-20.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ inputs.source_commit }}

      - name: Verify immutable source checkout
        shell: bash
        run: |
          set -euo pipefail
          OBSERVED_COMMIT="$(git rev-parse HEAD)"
          if [[ "${OBSERVED_COMMIT}" != "${SOURCE_COMMIT}" ]]; then
            echo "checked out commit differs from the authorized commit" >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain=v1 --untracked-files=all)" ]]; then
            echo "checked out tracked or untracked source is not clean" >&2
            exit 1
          fi
          if [[ -n "$(git clean -ndx)" ]]; then
            echo "checked out source contains untracked or ignored files" >&2
            exit 1
          fi

      - name: Inspect authenticated package privacy before publication
        id: package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 services/sam-worker/ghcr_publication.py \
            package-preflight \
            --github-output "${GITHUB_OUTPUT}"

      # docker/setup-buildx-action v3.11.1, reviewed 2026-07-20.
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
        with:
          install: true
          version: v0.25.0

      - name: Authenticate only to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Publish source-free package bootstrap when absent or inaccessible
        if: steps.package.outputs.bootstrap_required == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || [[ ! "${GITHUB_RUN_ATTEMPT}" =~ ^[1-9][0-9]*$ ]]; then
            echo "GitHub run identity is invalid" >&2
            exit 1
          fi
          BOOTSTRAP_CONTEXT="${RUNNER_TEMP}/sam-ghcr-bootstrap-context"
          if [[ -e "${BOOTSTRAP_CONTEXT}" ]]; then
            echo "bootstrap context already exists" >&2
            exit 1
          fi
          mkdir -m 700 "${BOOTSTRAP_CONTEXT}"
          printf '%s\n' \
            'FROM scratch' \
            'LABEL org.opencontainers.image.source="https://github.com/moodworks/fabrica-kit"' \
            > "${BOOTSTRAP_CONTEXT}/Dockerfile"
          if [[ "$(find "${BOOTSTRAP_CONTEXT}" -mindepth 1 -maxdepth 1 -printf '%f\n')" != "Dockerfile" ]]; then
            echo "bootstrap context is not source-free" >&2
            exit 1
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file "${BOOTSTRAP_CONTEXT}/Dockerfile" \
            --network=none \
            --provenance=false \
            --sbom=false \
            --tag "${IMAGE_REPOSITORY}:bootstrap-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --push \
            "${BOOTSTRAP_CONTEXT}"

      - name: Require authenticated private linked package before worker build
        id: privacy
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 services/sam-worker/ghcr_publication.py \
            package-confirm \
            --github-output "${GITHUB_OUTPUT}"

      - name: Build and publish one Linux AMD64 SAM worker image
        shell: bash
        run: |
          set -euo pipefail
          OBSERVED_COMMIT="$(git rev-parse HEAD)"
          if [[ "${OBSERVED_COMMIT}" != "${SOURCE_COMMIT}" ]]; then
            echo "build context commit differs from the authorized commit" >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain=v1 --untracked-files=all)" ]]; then
            echo "build context has tracked or untracked drift" >&2
            exit 1
          fi
          if [[ -n "$(git clean -ndx)" ]]; then
            echo "build context has untracked or ignored drift" >&2
            exit 1
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file services/sam-worker/Dockerfile \
            --build-arg "FABRICA_GIT_SHA=${SOURCE_COMMIT}" \
            --provenance=false \
            --sbom=false \
            --tag "${IMAGE_REPOSITORY}:${SOURCE_COMMIT}" \
            --push \
            --metadata-file "${RUNNER_TEMP}/sam-worker-build-metadata.json" \
            .

      - name: Verify private registry Linux AMD64 image identity
        id: identity
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 services/sam-worker/ghcr_publication.py \
            verify-image \
            --build-metadata "${RUNNER_TEMP}/sam-worker-build-metadata.json" \
            --source-commit "${SOURCE_COMMIT}" \
            --github-output "${GITHUB_OUTPUT}" \
            --step-summary "${GITHUB_STEP_SUMMARY}"

      - name: Remove transient Docker authentication
        if: always()
        shell: bash
        run: |
          set +e
          docker logout ghcr.io
